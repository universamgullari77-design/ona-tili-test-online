        .question { font-size: 20px; font-weight: bold; margin: 20px 0; color: #333; line-height: 1.4; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option { padding: 15px; background: #fff; border: 2px solid #eee; border-radius: 10px; cursor: pointer; text-align: center; transition: 0.2s; font-weight: 500; }
        .option:hover { border-color: var(--primary); background: #e8f5e9; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: var(--primary); color: white; }
        .badge { background: #f4bb44; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; }

</head>

    let cur = 0, score = 0, uName = "", uClass = "";

    function handleLogin() {
        uName = document.getElementById('username').value.trim();
        uClass = document.getElementById('userclass').value.trim().toLowerCase();
        if(!uName || !uClass) return alert("Iltimos to'ldiring!");
        if(uName === "Mehriniso" && (uClass === "ustoz" || uClass === "o'qituvchi")) {
            showAdmin();
        } else {
            start();
        }
    }

    function start() {
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('quiz-box').classList.remove('hidden');
        document.getElementById('user-display').innerText = uName;
        render();
    }

    function render() {
        if(cur >= questions.length) return finish();
        document.getElementById('q-info').innerText = `Savol: ${cur+1} / ${questions.length}`;
        document.getElementById('q-text').innerText = questions[cur].q;
        let h = "";
        questions[cur].a.forEach((opt, i) => {
            h += `<div class="option" onclick="next(${i})">${opt}</div>`;
        });
        document.getElementById('options-container').innerHTML = h;
    }

    function next(i) {
        if(i === questions[cur].c) score++;
        cur++;
        render();
    }

    function finish() {
        document.getElementById('quiz-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');
        document.getElementById('score-val').innerText = score;
        let db = JSON.parse(localStorage.getItem('final_quiz_v1') || "[]");
        db.push({n: uName, c: uClass.toUpperCase(), s: score});
        localStorage.setItem('final_quiz_v1', JSON.stringify(db));
        const msg = `✅ Natija:%0A👤 Ism: ${uName}%0A🏫 Sinf: ${uClass.toUpperCase()}%0A🎯 Ball: ${score}/100`;
        fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${msg}`);
    }

    function showAdmin() {
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
        let db = JSON.parse(localStorage.getItem('final_quiz_v1') || "[]");
        let html = "";
        db.sort((a,b) => b.s - a.s).forEach((r, i) => {
            html += `<tr><td>${i+1}</td><td>${r.n}</td><td>${r.c}</td><td>${r.s}</td></tr>`;
        });
        document.querySelector("#results-table tbody").innerHTML = html;
    }

    function clearData() {
        if(confirm("Tozalash?")) { localStorage.removeItem('final_quiz_v1'); showAdmin(); }
    }
